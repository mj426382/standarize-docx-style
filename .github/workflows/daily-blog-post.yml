name: 📝 Daily blog post (GPT) — DokFormat.pl

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"   # co poniedziałek 06:00 UTC

jobs:
  generate-blog:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate blog post, update registry and create PR
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          pip install requests -q
          python3 << 'PYEOF'
          import os, json, requests, re, sys, subprocess, time
          from datetime import datetime
          from pathlib import Path

          def run(cmd):
              result = subprocess.run(
                  cmd, shell=isinstance(cmd, str),
                  check=True, capture_output=True, text=True
              )
              if result.stdout:
                  print(result.stdout)
              return result.stdout.strip()

          # ── Gather existing posts ───────────────────────────────────────────
          posts_dir = Path("landing-page/src/data/blogPosts")
          existing_titles = []
          existing_slugs = []
          post_numbers = []
          for ts_file in sorted(posts_dir.glob("post-*.ts")):
              text = ts_file.read_text(encoding="utf-8")
              mt = re.search(r"title:\s*'([^']+)'", text) or re.search(r'title:\s*"([^"]+)"', text)
              if mt:
                  existing_titles.append(mt.group(1))
              ms = re.search(r"slug:\s*'([^']+)'", text) or re.search(r'slug:\s*"([^"]+)"', text)
              if ms:
                  existing_slugs.append(ms.group(1))
              mn = re.match(r"post-(\d+)\.ts$", ts_file.name)
              if mn:
                  post_numbers.append(int(mn.group(1)))

          next_n = (max(post_numbers) + 1) if post_numbers else 1

          now = datetime.now()
          months_pl = [
              'stycznia', 'lutego', 'marca', 'kwietnia', 'maja', 'czerwca',
              'lipca', 'sierpnia', 'września', 'października', 'listopada', 'grudnia'
          ]
          date_pl  = f"{now.day} {months_pl[now.month - 1]} {now.year}"
          date_iso = now.strftime("%Y-%m-%d")
          titles_str = "\n".join(f"- {t}" for t in existing_titles)

          # ── Prompts ─────────────────────────────────────────────────────────
          SYSTEM_PROMPT = (
              "Jesteś doświadczonym copywriterem SEO i strategiem contentu dla DokFormat.pl "
              "— polskiego narzędzia AI do automatycznego, spójnego formatowania dokumentów Word (.docx).\n\n"
              "CZYM JEST DOKFORMAT.PL:\n"
              "Aplikacja webowa, która:\n"
              "- Przyjmuje wklejony tekst, plik .txt lub .docx i zwraca profesjonalnie sformatowany "
              "dokument .docx wraz z podglądem HTML\n"
              "- Automatycznie nakłada spójną hierarchię nagłówków (H1/H2/H3), czcionki, odstępy i style\n"
              "- Pozwala edytować dokument poleceniem w języku naturalnym (prompt do AI)\n"
              "- Umożliwia ręczną edycję w edytorze WYSIWYG\n"
              "- Przechowuje historię wersji dokumentu i pozwala przywrócić wcześniejszą wersję\n\n"
              "KLUCZOWE FUNKCJE (naturalnie wplataj je w artykuły — max 3-4 wzmianki):\n"
              "- Automatyczne formatowanie .docx z tekstu, pliku .txt lub .docx\n"
              "- Spójne style: nagłówki, akapity, listy, tabele, odstępy\n"
              "- Edycja dokumentu poleceniem do AI (prompt) w języku naturalnym\n"
              "- Ręczna edycja w edytorze WYSIWYG\n"
              "- Podgląd HTML i pobieranie gotowego pliku .docx\n"
              "- Historia wersji i przywracanie wcześniejszych wersji\n\n"
              "GŁÓWNE OBSZARY POZYCJONOWANIA (priorytetowe tematy artykułów):\n"
              "- Spójne formatowanie dokumentów Word — style, nagłówki, hierarchia\n"
              "- Jak przygotować profesjonalny dokument biznesowy (oferta, raport, umowa, CV)\n"
              "- Style i szablony w Microsoft Word — dobre praktyki\n"
              "- Automatyzacja formatowania dokumentów z pomocą AI\n"
              "- Typografia i czytelność dokumentów — czcionki, odstępy, marginesy\n"
              "- Standaryzacja dokumentacji firmowej i spójność marki\n"
              "- Konwersja tekstu i plików .txt do estetycznego .docx\n"
              "- Najczęstsze błędy formatowania w Wordzie i jak ich unikać\n"
              "- Praca z długimi dokumentami — spis treści, sekcje, numeracja\n"
              "- Wersjonowanie dokumentów i kontrola zmian\n\n"
              "ZASADY PISANIA ARTYKUŁÓW:\n"
              "1. Język: profesjonalny, ale przystępny polski. Bez korporacyjnego żargonu.\n"
              "2. Styl: bezpośredni — zwracaj się do czytelnika 'Ty', 'Twój dokument', 'Twój plik'.\n"
              "3. Struktura: wciągający wstęp (problem lub pytanie retoryczne) → 4-6 sekcji H2 "
              "z opcjonalnymi H3 → podsumowanie z CTA.\n"
              "4. SEO On-Page: główna fraza kluczowa w tytule, excerpcie i pierwszym H2. "
              "Frazy LSI rozsiane naturalnie.\n"
              "5. Długość: 500-700 słów treści (pole 'content').\n"
              "6. Format pola 'content': czysty Markdown — używaj '# ', '## ', '### ', akapitów, "
              "list '- ', list numerowanych '1. ', **pogrubienia** i *kursywy*. Bez HTML, bez bloków ```.\n"
              "7. Zakończ artykuł CTA w Markdown: "
              "'**Gotowy?** [Sformatuj swój dokument za darmo na DokFormat.pl](https://app.dokformat.pl) "
              "— gotowy plik .docx w kilka sekund!'\n"
              "8. slug: tylko małe litery ASCII (a-z), myślniki zamiast spacji, bez polskich znaków, "
              "max 60 znaków, ZAWSZE zaczyna się od litery.\n"
              "9. category: jedna z: Formatowanie / Poradnik / Technologia / Produktywność / Biznes.\n"
              "10. readTime: liczba całkowita minut (200 słów/min).\n"
              "11. NIGDY nie powtarzaj tematów z listy istniejących artykułów."
          )

          USER_PROMPT = (
              f"Data publikacji: {date_pl}\n\n"
              f"Istniejące artykuły na blogu (NIE powtarzaj tych tematów, wybierz coś innego):\n"
              f"{titles_str}\n\n"
              "Napisz nowy artykuł SEO dla DokFormat.pl. Priorytetowo wybieraj tematy:\n"
              "- spójne formatowanie i style w dokumentach Word (nagłówki, akapity, listy, tabele)\n"
              "- jak przygotować profesjonalny dokument biznesowy (oferta, raport, umowa, CV, dokumentacja)\n"
              "- typografia i czytelność: dobór czcionek, odstępów, marginesów\n"
              "- standaryzacja dokumentacji firmowej i spójność wizualna marki\n"
              "- automatyzacja formatowania dokumentów z pomocą AI\n"
              "- najczęstsze błędy formatowania w Wordzie i jak ich unikać\n"
              "- praca z długimi dokumentami: spis treści, sekcje, numeracja stron\n"
              "- konwersja zwykłego tekstu lub pliku .txt do estetycznego .docx\n"
              "- wersjonowanie dokumentów i kontrola zmian\n"
              "- szablony dokumentów — kiedy i jak je stosować\n"
              "— cokolwiek jeszcze NIE było omówione, związanego z formatowaniem dokumentów, "
              "stylami Word, typografią lub automatyzacją pracy z dokumentami.\n\n"
              "Zwróć WYŁĄCZNIE surowy obiekt JSON (zero markdown wrappera, zero ```, zero komentarzy "
              "przed/po), w tym DOKŁADNYM formacie — wypełnij wszystkie pola właściwą treścią:\n"
              "{\n"
              '  "title": "Tytuł SEO 60-70 znaków z główną frazą kluczową",\n'
              '  "slug": "slug-bez-polskich-znakow-zaczyna-sie-od-litery-max-60-znakow",\n'
              '  "excerpt": "Opis 150-180 znaków z główną frazą SEO. Zachęca do przeczytania artykułu.",\n'
              '  "category": "jedna z: Formatowanie / Poradnik / Technologia / Produktywność / Biznes",\n'
              '  "readTime": 5,\n'
              '  "content": "# Tytuł\\n\\n## Sekcja\\n\\nMarkdown 500-700 słów, zakończony CTA do app.dokformat.pl"\n'
              "}"
          )

          # ── Call GitHub Models API ──────────────────────────────────────────
          token = os.environ.get("GH_TOKEN") or os.environ.get("GITHUB_TOKEN")
          if not token:
              print("ERROR: GH_TOKEN not set"); sys.exit(1)

          resp = requests.post(
              "https://models.inference.ai.azure.com/chat/completions",
              headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"},
              json={
                  "model": "gpt-4o",
                  "messages": [
                      {"role": "system", "content": SYSTEM_PROMPT},
                      {"role": "user",   "content": USER_PROMPT},
                  ],
                  "max_tokens": 3000,
                  "temperature": 0.75,
                  "response_format": {"type": "json_object"},
              },
              timeout=180,
          )
          print(f"API status: {resp.status_code}")
          if resp.status_code != 200:
              print(resp.text); sys.exit(1)

          raw = resp.json()["choices"][0]["message"]["content"].strip()
          raw = re.sub(r"^```\w*\n?", "", raw)
          raw = re.sub(r"\n?```$",    "", raw)

          try:
              article = json.loads(raw.strip())
          except json.JSONDecodeError as e:
              print(f"JSON parse error: {e}\nRaw: {raw[:500]}"); sys.exit(1)

          # ── Normalize fields ────────────────────────────────────────────────
          slug = re.sub(r"[^a-z0-9-]", "", article["slug"].lower()).strip("-")[:60] or f"artykul-{next_n}"
          try:
              read_time = int(article.get("readTime", 5))
          except (TypeError, ValueError):
              read_time = 5

          # ── Write TypeScript post file ──────────────────────────────────────
          def esc_sq(s):
              """Escape for a single-quoted TS string."""
              return str(s).replace("\\", "\\\\").replace("'", "\\'")

          def esc_tl(s):
              """Escape for a TS template literal (backtick string)."""
              return str(s).replace("\\", "\\\\").replace("`", "\\`").replace("${", "\\${")

          ts_content = (
              "import type { BlogPostData } from '../blogPost';\n\n"
              "export const post: BlogPostData = {\n"
              f"  id: '{next_n}',\n"
              f"  title: '{esc_sq(article['title'])}',\n"
              f"  slug: '{esc_sq(slug)}',\n"
              f"  excerpt: '{esc_sq(article['excerpt'])}',\n"
              f"  publishedAt: '{date_iso}',\n"
              f"  readTime: {read_time},\n"
              f"  category: '{esc_sq(article['category'])}',\n"
              "  content: `\n"
              f"{esc_tl(article['content'])}\n"
              "`,\n"
              "};\n"
          )

          out_file = posts_dir / f"post-{next_n}.ts"
          out_file.write_text(ts_content, encoding="utf-8")
          print(f"Saved: {out_file}")

          # ── Update blogPosts.ts registry ────────────────────────────────────
          var_name = f"post{next_n}"
          registry_path = Path("landing-page/src/data/blogPosts.ts")
          reg = registry_path.read_text(encoding="utf-8")

          new_import = f"import {{ post as {var_name} }} from './blogPosts/post-{next_n}';"

          # Insert new import right after the last existing './blogPosts/post-N' import
          lines = reg.split("\n")
          import_idxs = [
              i for i, l in enumerate(lines)
              if re.search(r"from './blogPosts/post-\d+';", l)
          ]
          if import_idxs:
              lines.insert(import_idxs[-1] + 1, new_import)
          else:
              # Fallback: after the type import
              lines.insert(1, new_import)
          reg = "\n".join(lines)

          # Add the new post as the first element of the blogPosts array
          reg = re.sub(
              r"(export const blogPosts: BlogPostData\[\] = \[)",
              lambda m: m.group(1) + var_name + ", ",
              reg,
              count=1,
          )

          registry_path.write_text(reg, encoding="utf-8")
          print(f"blogPosts.ts updated — added: {var_name}")

          # ── Git & PR ────────────────────────────────────────────────────────
          branch     = f"blog/seo-{int(time.time())}"
          commit_msg = f"feat(blog): {article['title']} ({date_iso})"

          run("git config user.name 'github-actions[bot]'")
          run("git config user.email 'github-actions[bot]@users.noreply.github.com'")
          run(f"git checkout -b {branch}")
          run("git add landing-page/src/data/")
          run(["git", "commit", "-m", commit_msg])
          run(["git", "push", "origin", branch])

          pr_body = (
              f"## Automatycznie wygenerowany artykuł SEO — DokFormat.pl\n\n"
              f"**Data:** {date_pl}\n"
              f"**Slug:** `{slug}`\n"
              f"**Kategoria:** {article.get('category', '')}\n"
              f"**Czas czytania:** {read_time} min\n\n"
              f"Artykuł wygenerowany przez GitHub Actions + GitHub Models API (gpt-4o).\n\n"
              f"**Nowy plik:** `landing-page/src/data/blogPosts/post-{next_n}.ts`\n"
              f"**Zaktualizowany rejestr:** `landing-page/src/data/blogPosts.ts`"
          )
          with open("/tmp/pr_body.txt", "w") as f:
              f.write(pr_body)

          pr_url = run([
              "gh", "pr", "create",
              "--title", f"🤖 SEO Blog: {article['title']}",
              "--body-file", "/tmp/pr_body.txt",
              "--base", "main",
              "--head", branch,
          ])
          print(f"PR created: {pr_url}")

          run([
              "gh", "pr", "merge", pr_url,
              "--squash", "--delete-branch",
              "--subject", commit_msg,
              "--body", "",
          ])
          print("✅ PR merged into main.")
          PYEOF
